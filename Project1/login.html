<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Flow Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="welcome-container">

    <div class="image">
        <img src="images/4420721.jpg" alt="Welcome Image" class="welcome-image">
    </div>

    <div class="welcome">
        <div class="welcome-text">

            <h1>Welcome Back!</h1>

            <div class="message" style="display:none;">
                <p></p>
            </div>

            <form>

                <label for="Email">Your Email</label><br>
                <input type="email" id="Email" placeholder="Enter your email"><br><br>

                <label for="password">Password</label><br>
                <input type="password" id="password" placeholder="Enter your password"><br><br>

            </form>

            <div>
                <h2 class="forgot">
                    <a href="password.html">Forgot Password?</a>
                </h2>
            </div>

            <button type="button" class="log" onclick="Login()">
                Login
            </button>
            <div id="g_id_onload"
                data-client_id="533715299770-qkfkkp88n8tjc2ittk1t6pju14hov61q.apps.googleusercontent.com"
                data-callback="handleGoogleLogin">
            </div>

<div class="g_id_signin"></div>

            <p>
                Don't have an account?
                <span><a href="register.html">Register</a></span>
            </p>


        </div>
    </div>

</div>

<!-- ROLE SELECTION MODAL (For new Google users) -->
<div class="modal-overlay" id="roleModalOverlay">
    <div class="role-modal">
        <h2>Welcome to Talent Flow!</h2>
        <p>Please select your role to complete your registration.</p>
        
        <div class="role-options">
            <button class="role-btn instructor" onclick="submitGoogleWithRole('instructor')">
                <span>I am an Instructor</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" />
                </svg>
            </button>
            <button class="role-btn student" onclick="submitGoogleWithRole('student')">
                <span>I am a Student</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
                </svg>
            </button>
        </div>
    </div>
</div>


<script>

function Login() {

    const email = document.getElementById('Email').value.trim();
    const password = document.getElementById('password').value;
    const messageDiv = document.querySelector('.message');
    const msgBlock = messageDiv.querySelector("p");
    const logBtn = document.querySelector('.log');

    const url = 'https://truemind.onrender.com/api/v1/auth/login/';

    if (!email || !password) {
        msgBlock.textContent = "Please enter both email and password.";
        msgBlock.style.color = "red";
        messageDiv.style.display = "block";
        return;
    }

    logBtn.textContent = "Logging in...";
    logBtn.disabled = true;

    axios.post(url, {
        email: email,
        password: password
    })
    .then(response => {
        // SAVE TOKENS
        localStorage.setItem("access_token", response.data.access);
        localStorage.setItem("refresh_token", response.data.refresh);
        localStorage.setItem("user", JSON.stringify(response.data.user));

        msgBlock.textContent = "Success! Redirecting...";
        msgBlock.style.color = "green";
        messageDiv.style.display = "block";

        const role = (response.data.user?.role || '').toLowerCase();
        setTimeout(() => {
            if (role === 'student') {
                window.location.href = "dashboard.html";
            } else {
                // instructor or admin
                window.location.href = "courses.html";
            }
        }, 800);

    })
    .catch(err => {
        logBtn.textContent = "Login";
        logBtn.disabled = false;
        
        let errorMsg = "Login failed";
        if (err.response?.data?.detail) {
            errorMsg = err.response.data.detail;
        } else if (err.response?.data) {
            errorMsg = "Check your email and password.";
        }
        
        msgBlock.textContent = errorMsg;
        msgBlock.style.color = "red";
        messageDiv.style.display = "block";
    });
}

let pendingGoogleToken = null;

function handleGoogleLogin(response) {
    pendingGoogleToken = response.credential;
    
    // Initial attempt without role
    axios.post("https://truemind.onrender.com/api/v1/auth/google/", {
        token: pendingGoogleToken
    })
    .then(res => {
        completeLogin(res.data);
    })
    .catch(err => {
        // If user is new, backend will return "role_required"
        if (err.response?.status === 400 && err.response?.data?.error === "role_required") {
            document.getElementById('roleModalOverlay').style.display = 'flex';
        } else {
            showLoginError(err.response?.data?.detail || "Google login failed. Please try again.");
        }
    });
}

function submitGoogleWithRole(role) {
    if (!pendingGoogleToken) return;

    // Hide modal and show loading
    document.getElementById('roleModalOverlay').style.display = 'none';
    const msgBlock = document.querySelector('.message p');
    msgBlock.textContent = "Creating your account...";
    document.querySelector('.message').style.display = 'block';

    axios.post("https://truemind.onrender.com/api/v1/auth/google/", {
        token: pendingGoogleToken,
        role: role
    })
    .then(res => {
        completeLogin(res.data);
    })
    .catch(err => {
        showLoginError(err.response?.data?.detail || "Registration failed. Please try again.");
    });
}

function completeLogin(data) {
    // Store tokens and user
    localStorage.setItem("access_token", data.tokens.access);
    localStorage.setItem("refresh_token", data.tokens.refresh);
    localStorage.setItem("user", JSON.stringify(data.user));

    const messageDiv = document.querySelector('.message');
    const msgBlock   = messageDiv.querySelector('p');
    msgBlock.textContent = "Success! Redirecting...";
    msgBlock.style.color = "green";
    messageDiv.style.display = "block";

    // Role-based redirect
    const role = (data.user?.role || '').toLowerCase();
    setTimeout(() => {
        if (role === 'student') {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "courses.html";
        }
    }, 800);
}

function showLoginError(msg) {
    const messageDiv = document.querySelector('.message');
    const msgBlock   = messageDiv.querySelector('p');
    msgBlock.textContent = msg;
    msgBlock.style.color = "red";
    messageDiv.style.display = "block";
}

</script>

</body>
</html>
