<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/selected.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<title>Forgot Password - Talent Flow</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
*{
    box-sizing: border-box;
}
body{
    font-family:'Inter', sans-serif;
    background:#f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    background:white;
    padding:40px;
    border-radius:16px;
    width:480px;
    box-shadow:0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
}
.box h2{
    margin:0 0 10px 0;
    text-align:center;
    color:#1e293b;
    font-size:26px;
    font-weight: 700;
}
.box p.subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 30px;
    line-height: 1.5;
}
.form-group{
    margin-bottom:20px;
}
input{
    width:100%;
    padding:14px 16px;
    border:1.5px solid #e2e8f0;
    border-radius:10px;
    font-size:15px;
    outline:none;
    transition: all 0.2s;
    background: #fdfdfd;
}
input:focus{
    border-color:#2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    background: #fff;
}
button {
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition: all 0.2s;
    margin-top:10px;
}
button:hover{
    background:#1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}
button:disabled {
    background: #94a3b8;
    cursor: not-allowed;
    transform: none;
}
.footer-link {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
    color: #64748b;
}
.footer-link a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
}
.footer-link a:hover {
    text-decoration: underline;
}
.message {
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 20px;
    display: none;
    text-align: center;
}
.message.success {
    background: #f0fdf4;
    color: #166534;
    border: 1px solid #bbf7d0;
}
.message.error {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
}
</style>
</head>
<body>

<div class="box">

    <h2>Forgot Password?</h2>
    <p class="subtitle">No worries! Enter your email address and we'll send you a link to reset your password.</p>

    <div class="form-group">
        <input type="email" id="email" placeholder="name@company.com">
    </div>

    <button id="reset-btn" onclick="sendResetEmail()">Send Reset Email</button>
    
    <div id="msg-block" class="message"></div>

    <div class="footer-link">
        Remember your password? <a href="login.html">Back to Login</a>
    </div>

</div>

<script>
function sendResetEmail(){
    const emailInput = document.getElementById("email");
    const email = emailInput.value.trim();
    const btn = document.getElementById("reset-btn");
    const msgBlock = document.getElementById("msg-block");

    msgBlock.style.display = "none";

    if(!email){
        msgBlock.textContent = "Please enter your email address.";
        msgBlock.className = "message error";
        msgBlock.style.display = "block";
        return;
    }

    btn.textContent = "Sending...";
    btn.disabled = true;

    axios.post(
        "https://truemind.onrender.com/api/v1/auth/password-reset/",
        {
            email: email
        }
    )
    .then(response=>{
        msgBlock.textContent = "Success! If that email is registered, you will receive a reset link shortly.";
        msgBlock.className = "message success";
        msgBlock.style.display = "block";
        btn.textContent = "Email Sent";
        emailInput.value = "";
    })
    .catch(error=>{
        console.error(error);
        btn.textContent = "Send Reset Email";
        btn.disabled = false;
        
        let errorMsg = "Failed to send reset email. Please try again.";
        if (error.response?.data?.email) {
            errorMsg = error.response.data.email[0];
        } else if (error.response?.data?.detail) {
            errorMsg = error.response.data.detail;
        }

        msgBlock.textContent = errorMsg;
        msgBlock.className = "message error";
        msgBlock.style.display = "block";
    });
}
</script>

</body>
</html>
