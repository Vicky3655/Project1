<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px 20px;
    border-radius:10px;
    width:400px;
}
input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    justify-content: center;
}
button{
    background:blue;
    color:white;
    border:none;
    border-radius: 10px;
}
</style>
</head>
<body>

<div class="box">

    <h2>Forgot Password</h2>

    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="sendResetEmail()">Send Reset Email</button>

</div>

<script>

function sendResetEmail(){

    const email = document.getElementById("email").value;

    if(!email){
        alert("Please enter your email.");
        return;
    }

    axios.post(
        "https://truemind.onrender.com/api/v1/auth/password-reset/",
        {
            email: email
        }
    )

    .then(response=>{

        alert("Reset link/token sent to your email.");

        window.location.href = "reset_confirm.html";

    })

    .catch(error=>{

        console.log(error);

        alert("Failed to send reset email.");

    });

}

</script>

</body>
</html>
