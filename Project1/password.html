<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/selected.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<title>Forgot Password</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
*{
    box-sizing: border-box;
}
body{
    font-family:'Inter', sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:450px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.box h2{
    margin:0 0 25px 0;
    text-align:center;
    color:#333;
    font-size:24px;
}
.form-group{
    margin-bottom:20px;
}
input{
    width:100%;
    padding:14px 16px;
    margin:0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:border-color 0.3s;
}
input:focus{
    border-color:#007bff;
}
button{
    width:100%;
    padding:14px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:background 0.3s;
    margin-top:10px;
}
button:hover{
    background:#0056b3;
}
</style>
</head>
<body>

<div class="box">

    <h2>Forgot Password</h2>

    <div class="form-group">
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <button onclick="sendResetEmail()">Send Reset Email</button>

</div>

<script>

function sendResetEmail(){

    const email = document.getElementById("email").value;

    if(!email){
        alert("Please enter your email.");
        return;
    }

    axios.post(
        "https://truemind.onrender.com/api/v1/auth/password-reset/",
        {
            email: email
        }
    )

    .then(response=>{

        alert("Reset link/token sent to your email.");

        window.location.href = "reset_confirm.html";

    })

    .catch(error=>{

        console.log(error);

        alert("Failed to send reset email.");

    });

}

</script>

</body>
</html>
