<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Flow Register</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <div class="welcome-container">

        <div class="image">
            <img src="images/4807.jpg" alt="Welcome Image" class="welcome-image">
        </div>

        <div class="welcome">
            <div class="welcome-text">

                <h1>Welcome to Talent Flow!</h1>
                <p>Create Your Account</p>

                <form id="registerForm" onsubmit="event.preventDefault(); Register();">

                    <label for="Name">Name</label><br>
                    <input type="text" id="Name" placeholder="Enter your name" required><br><br>

                    <label for="Email">Email</label><br>
                    <input type="email" id="Email" placeholder="Username@gmail.com" required><br><br>

                    <label for="password">Password</label><br>
                    <input type="password" id="password" placeholder="Enter your 8-character password" required><br><br>

                    <label for="role-select">Choose a role:</label><br>
                    <select id="role-select" required>
                        <option value="">--Please choose an option--</option>
                        <option value="instructor">Instructor</option>
                        <option value="student">Student</option>
                    </select><br><br>

                    <button type="submit" class="sign">
                        Create Account
                    </button>

                </form>

                <p>
                    Already have an account?
                    <span><a href="login.html">Login</a></span>
                </p>

            </div>
        </div>

    </div>


    <script>

        function Register() {

            const name = document.getElementById('Name').value.trim();
            const email = document.getElementById('Email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role-select').value;
            const btn = document.querySelector('.sign');

            // Basic Validation
            if (!name || !email || !password || !role) {
                alert("Please fill all fields.");
                return;
            }

            const url = 'https://truemind.onrender.com/api/v1/auth/register/';

            btn.textContent = "Creating Account...";
            btn.disabled = true;

            axios.post(url, {
                name: name,
                email: email,
                password: password,
                confirm_password: password,
                role: role
            })
                .then(response => {
                    // Registration success - now auto-login
                    const loginUrl = 'https://truemind.onrender.com/api/v1/auth/login/';
                    
                    axios.post(loginUrl, {
                        email: email,
                        password: password
                    })
                    .then(loginRes => {
                        // SAVE TOKENS (Shared with login.html logic)
                        localStorage.setItem("access_token", loginRes.data.access);
                        localStorage.setItem("refresh_token", loginRes.data.refresh);
                        localStorage.setItem("user", JSON.stringify(loginRes.data.user));

                        alert("Registration Successful! Redirecting to selection...");
                        window.location.href = 'main1.html';
                    })
                    .catch(loginErr => {
                        console.error("Auto-login failed:", loginErr);
                        alert("Account created, but we couldn't log you in automatically. Please log in manually.");
                        window.location.href = 'login.html';
                    });
                })
                .catch(error => {
                    btn.textContent = "Create Account";
                    btn.disabled = false;

                    if (error.response && error.response.data) {
                        let errStr = '';
                        for (const [k, v] of Object.entries(error.response.data)) {
                            errStr += `${k}: ${v}\n`;
                        }
                        alert("Registration Failed:\n" + errStr);
                    } else {
                        alert("Something went wrong. Please check your connection.");
                    }
                });

        }

    </script>


</body>

</html>
