<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Flow Register</title>

    <link rel="stylesheet" href="css/register.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

    <div class="welcome-container">

        <div class="image">
            <img src="images/4807.jpg" alt="Welcome Image" class="welcome-image">
        </div>

        <div class="welcome">
            <div class="welcome-text">

                <h1>Welcome to Talent Flow!</h1>
                <p>Create Your Account</p>

                <form id="registerForm" onsubmit="event.preventDefault(); Register();">

                    <label for="Name">Name</label><br>
                    <input type="text" id="Name" placeholder="Enter your name" required><br><br>

                    <label for="Email">Email</label><br>
                    <input type="email" id="Email" placeholder="Username@gmail.com" required><br><br>

                    <label for="password">Password</label><br>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your 8-character password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7a8.06 8.06 0 0 1 1.521 5.84 1.012 1.012 0 0 1-1.433-.44c-.423-.708-.676-1.514-.753-2.404a10.06 10.06 0 0 0-.537-2.767m-2.506 2.495a2.5 2.5 0 1 1-3.55-2.55m3.55 2.5a2.5 2.5 0 1 0 3.55-2.55" />
                            </svg>
                            <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="display: none;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.245 20 12 20s8.774-3.662 10.066-7.998a10.522 10.522 0 0 0 1.015-3.504m0 6.504a2.5 2.5 0 1 1-3.55-2.55 2.5 2.5 0 0 1 3.55 2.55Z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.271 17.271A10.5 10.5 0 0 0 19.5 12c0-2.622-.993-5.147-2.729-7.032m-2.72.936a2.5 2.5 0 1 1-3.05-3.05m6.364 6.364A8.5 8.5 0 0 0 12 19.5" />
                            </svg>
                        </button>
                    </div>
                    <br><br>

                    <label for="role-select">Choose a role:</label><br>
                    <select id="role-select" required>
                        <option value="">--Please choose an option--</option>
                        <option value="instructor">Instructor</option>
                        <option value="student">Student</option>
                    </select><br><br>

                    <button type="submit" class="sign">
                        Create Account
                    </button>

                </form>

                <p>
                    Already have an account?
                    <span><a href="login.html">Login</a></span>
                </p>

            </div>
        </div>

    </div>


    <script>

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.querySelector('.eye-icon');
            const eyeOffIcon = document.querySelector('.eye-off-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                passwordInput.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        }

        function Register() {

            const name = document.getElementById('Name').value.trim();
            const email = document.getElementById('Email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role-select').value;
            const btn = document.querySelector('.sign');

            // Basic Validation
            if (!name || !email || !password || !role) {
                alert("Please fill all fields.");
                return;
            }

            const url = 'https://truemind.onrender.com/api/v1/auth/register/';
            
            btn.textContent = "Creating Account...";
            btn.disabled = true;

            axios.post(url, {
                name: name,
                email: email,
                password: password,
                confirm_password: password,
                role: role
            })
            .then(response => {
                alert("Registration Successful!");
                window.location.href = 'login.html';
            })
            .catch(error => {
                btn.textContent = "Create Account";
                btn.disabled = false;
                
                if (error.response && error.response.data) {
                    let errStr = '';
                    for (const [k, v] of Object.entries(error.response.data)) {
                        errStr += `${k}: ${v}\n`;
                    }
                    alert("Registration Failed:\n" + errStr);
                } else {
                    alert("Something went wrong. Please check your connection.");
                }
            });

        }

    </script>


</body>
</html>
