<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/selected.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

<title>Reset Password - Talent Flow</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
*{
    box-sizing: border-box;
}
body{
    font-family:'Inter', sans-serif;
    background:#f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    background:white;
    padding:40px;
    border-radius:16px;
    width:480px;
    box-shadow:0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
}
.box h2{
    margin:0 0 10px 0;
    text-align:center;
    color:#1e293b;
    font-size:26px;
    font-weight: 700;
}
.box p.subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 30px;
}
.form-group{
    margin-bottom:20px;
    position: relative;
}
.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 8px;
}
input{
    width:100%;
    padding:12px 16px;
    border:1.5px solid #e2e8f0;
    border-radius:10px;
    font-size:15px;
    outline:none;
    transition: all 0.2s;
    background: #fdfdfd;
}
input:focus{
    border-color:#2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    background: #fff;
}
button.submit-btn{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition: all 0.2s;
    margin-top:10px;
}
button.submit-btn:hover{
    background:#1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}
button.submit-btn:active {
    transform: translateY(0);
}
.error-msg {
    color: #ef4444;
    font-size: 13px;
    margin-top: 8px;
    display: none;
    text-align: center;
}
</style>
</head>
<body>

<div class="box">

    <h2>Create New Password</h2>
    <p class="subtitle">Enter your new password below to secure your account.</p>

    <input type="text" id="token" hidden>

    <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" placeholder="At least 8 characters">
    </div>

    <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" placeholder="Repeat your new password">
    </div>

    <button class="submit-btn" onclick="resetPassword()">Reset Password</button>
    
    <div id="error-block" class="error-msg"></div>

</div>


<script>
// Extract token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

if (token) {
    document.getElementById("token").value = token;
} else {
    // If no token, maybe they landed here by mistake
    const errorBlock = document.getElementById("error-block");
    errorBlock.textContent = "Invalid reset link. Please request a new one.";
    errorBlock.style.display = "block";
    document.querySelector('.submit-btn').disabled = true;
    document.querySelector('.submit-btn').style.opacity = '0.5';
}

function resetPassword(){
    const token = document.getElementById("token").value;
    const new_password = document.getElementById("new_password").value;
    const confirm_password = document.getElementById("confirm_password").value;
    const errorBlock = document.getElementById("error-block");
    const btn = document.querySelector('.submit-btn');

    errorBlock.style.display = "none";

    if(!token || !new_password || !confirm_password){
        errorBlock.textContent = "Please fill all fields.";
        errorBlock.style.display = "block";
        return;
    }

    if(new_password.length < 8) {
        errorBlock.textContent = "Password must be at least 8 characters.";
        errorBlock.style.display = "block";
        return;
    }

    if(new_password !== confirm_password){
        errorBlock.textContent = "Passwords do not match.";
        errorBlock.style.display = "block";
        return;
    }

    btn.textContent = "Updating Passport...";
    btn.disabled = true;

    axios.post(
        "https://truemind.onrender.com/api/v1/auth/password-reset/confirm/",
        {
            token: token,
            new_password: new_password,
            confirm_password: confirm_password
        }
    )
    .then(response=>{
        alert("Password reset successful! Redirecting to login...");
        window.location.href = "login.html";
    })
    .catch(error=>{
        btn.textContent = "Reset Password";
        btn.disabled = false;
        
        console.error(error);
        const serverMsg = error.response?.data?.token || 
                          error.response?.data?.new_password || 
                          error.response?.data?.detail || 
                          "Password reset failed. The link may have expired.";
        
        errorBlock.textContent = serverMsg;
        errorBlock.style.display = "block";
    });
}
</script>

</body>
</html>
