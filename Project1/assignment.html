    <!-- MAIN -->
    <main class="content">

        <!-- Header row -->
        <div class="content-header">
            <h1>Assignment</h1>
            <button class="add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </button>
        </div>

        <!-- Table header -->
        <div class="table-header">
            <span>Assignment Title</span>
            <span>Course</span>
            <span>Due Date</span>
            <span>Status</span>
            <span>Actions</span>
        </div>
        <div class="table-body">
            <table>
                <tbody class="assignments-tbody">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <div class="empty-state">
            <div class="illustration"><img src="6206973.jpg" alt="No assignments"></div>
            <h2>No assignments created yet</h2>
            <p>Create assignments to track learner progress and submissions</p>
            <button class="create-btn">Create Assignment</button>
        </div>

        <!-- Bottom toolbar -->
        <div class="bottom-toolbar">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="published">
                    <span class="dot published"></span> Published
                </button>
                <button class="filter-btn" data-filter="draft">
                    <span class="dot draft"></span> Draft
                </button>
                <button class="filter-btn" data-filter="closed">
                    <span class="dot closed"></span> Closed
                </button>
            </div>
            <div class="search-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
                <input type="text" placeholder="Search">
            </div>
            <button class="sort-btn">
                Sort by course name
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </button>
        </div>


        <div id="add-assignment-modal" class="modal">
            <div class="modal-content">
                <button class="close-btn">&times;</button>
                <h2>Create Assignment</h2>
                <form id="add-assignment-form">
                    <label>Assignment Title</label>
                    <input type="text" name="title" required placeholder="e.g., Final Project">
                    
                    <label>Description</label>
                    <textarea name="description" placeholder="Provide clear instructions for the assignment..." rows="4"></textarea>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <label>Course</label>
                            <select name="course" required>
                                <option value="">Select a course...</option>
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div>
                            <label>Max Score</label>
                            <input type="number" name="max_score" value="100" min="1">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <label>Due Date & Time</label>
                            <input type="datetime-local" name="due_date" required>
                        </div>
                        <div>
                            <label>Status</label>
                            <select name="status">
                                <option value="draft">Draft</option>
                                <option value="published" selected>Published</option>
                                <option value="closed">Closed</option>
                            </select>
                        </div>
                    </div>

                    <label>Reference Attachment (Optional)</label>
                    <input type="file" name="attachment" style="padding-top: 8px; border: none; background: transparent;">

                    <button type="submit" class="submit-btn" style="margin-top: 24px;">Create Assignment</button>
                </form>
            </div>
        </div>

        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay"></div>

        <!-- Hamburger for mobile -->
        <button class="hamburger-btn" style="display:none;background:none;border:none;color:#0F172A;cursor:pointer;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>

    </main>
