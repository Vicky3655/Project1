<!-- MAIN -->
<main class="content">

    <div class="page-header">
        <h1>Students</h1>
        <button class="add-student-btn" id="openModalBtn">Add Student</button>
    </div>

    <div class="toolbar">
        <div class="search-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search students">
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">
                <span class="dot active-dot"></span> Active
            </button>
            <button class="filter-btn" data-filter="inactive">
                <span class="dot inactive-dot"></span> Inactive
            </button>
        </div>
    </div>

    <div class="table-wrap">
        <table id="studentsTable">
            <thead>
                <tr>
                    <th onclick="sortTable('name')">Name <span class="sort-icon">↕</span></th>
                    <th onclick="sortTable('email')">Email <span class="sort-icon">↕</span></th>
                    <th onclick="sortTable('course')">Courses Enrolled <span class="sort-icon">↕</span></th>
                    <th onclick="sortTable('progress')">Progress <span class="sort-icon">↕</span></th>
                    <th onclick="sortTable('status')">Status <span class="sort-icon">↕</span></th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none;">No students match your search.</div>
    </div>

    <div class="pagination" id="pagination"></div>

</main>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Add Student</h2>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="inputName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="inputEmail" placeholder="email@gmail.com">
            </div>
            <div class="form-group">
                <label>Course Enrolled</label>
                <select id="inputCourse">
                    <option value="">Select a course</option>
                    <option>Introduction to Product Design</option>
                    <option>UI/UX Design Fundamentals</option>
                    <option>Frontend Development</option>
                    <option>Data Analysis with Python & SQL</option>
                    <option>Introduction to Backend Development</option>
                    <option>Cloud Computing & AWS</option>
                </select>
            </div>
            <div class="form-group">
                <label>Progress (%)</label>
                <input type="number" id="inputProgress" placeholder="0–100" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="inputStatus">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn-save" id="saveBtn">Save Student</button>
        </div>
    </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteOverlay">
    <div class="modal confirm-modal">
        <div class="modal-header">
            <h2>Unenroll Student</h2>
            <button class="modal-close" id="closeDeleteBtn">&times;</button>
        </div>
        <div class="modal-body">
            <p>Are you sure you want to unenroll <strong id="deleteName"></strong> from this course?</p>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="cancelDeleteBtn">Cancel</button>
            <button class="btn-del" id="confirmDeleteBtn">Unenroll Student</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="students.js"></script>
</body>
</html>
