<html lang="en">

<head>

            <span>Talent Flow</span>
        </div>
        <div class="nav-right">
            <span class="nav-role">Instructor</span>
            <button class="nav-icon-btn" aria-label="Notifications">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"

            <div class="avatar">
                <img src="https://i.pravatar.cc/40?img=47" alt="Instructor">

        </div>
    </nav>

    <!-- SIDEBAR -->

            </svg>
        </a>
        <a href="students.html" class="sidebar-link active" data-tip="Students">

        <a href="#" class="sidebar-link logout-link" data-tip="Logout" onclick="logout(); return false;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
            </svg>
        </a>
    </aside>

    <!-- MAIN -->
    <main class="content">

        <div class="page-header">
            <h1>Students</h1>
            <button class="add-student-btn" id="openModalBtn">Add Student</button>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search students">
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">
                    <span class="dot active-dot"></span> Active
                </button>
                <button class="filter-btn" data-filter="inactive">
                    <span class="dot inactive-dot"></span> Inactive
                </button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Email</th>
                        <th>Joined</th>
                        <th>Courses</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Rendered by students.js -->
                </tbody>
            </table>
        </div>

    </main>

    <!-- ADD STUDENT MODAL -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Student</h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <form id="studentForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password (Optional)</label>
                    <input type="password" id="password" placeholder="Leave empty for auto-gen">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveBtn">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="students.js"></script>

</body>

</html>
