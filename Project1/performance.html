<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="allowed-roles" content="instructor,admin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="performance.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Talent Flow – Performance</title>
</head>

<body>

    <!-- NAV -->
    <nav>
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
            </svg>
            <span>Talent Flow</span>
        </div>
        <div class="nav-right">
            <span class="nav-role">Instructor</span>
            <button class="nav-icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                </svg>
            </button>
            <div class="avatar">
                <img src="https://i.pravatar.cc/40?img=47" alt="Instructor">
            </div>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-link" data-tip="Dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
            </svg>
        </a>
        <a href="courses.html" class="sidebar-link" data-tip="Courses">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125Z" />
            </svg>
        </a>
        <a href="assignment.html" class="sidebar-link" data-tip="Assignments">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25M9 16.5v.75m3-3v3M15 12v5.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
        </a>
        <a href="students.html" class="sidebar-link" data-tip="Students">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 3.741-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" />
            </svg>
        </a>
        <a href="performance.html" class="sidebar-link active" data-tip="Performance">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
            </svg>
        </a>
        <a href="settings.html" class="sidebar-link" data-tip="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.75 6.75a4.5 4.5 0 0 1-4.884 4.484c-1.076-.091-2.264.071-2.95.904l-7.152 8.684a2.548 2.548 0 1 1-3.586-3.586l8.684-7.152c.833-.686.995-1.874.904-2.95a4.5 4.5 0 0 1 6.336-4.486l-3.276 3.276a3.004 3.004 0 0 0 2.25 2.25l3.276-3.276c.256.565.398 1.192.398 1.852Z" />
            </svg>
        </a>
        <a href="#" class="sidebar-link logout-link" data-tip="Logout" onclick="logout(); return false;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
            </svg>
        </a>
    </aside>

    <!-- MAIN -->
    <main class="content">

        <!-- Header -->
        <div class="page-header">
            <h1>Performance</h1>
            <div class="period-dropdown" id="periodDropdown">
                <button class="period-btn" id="periodBtn">
                    <span id="periodLabel">Last 7 days</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                    </svg>
                </button>
                <ul class="period-menu" id="periodMenu">
                    <li data-value="Last 7 days">Last 7 days</li>
                    <li data-value="Last 30 days">Last 30 days</li>
                    <li data-value="Last 3 months">Last 3 months</li>
                    <li data-value="This year">This year</li>
                    <li data-value="All time">All time</li>
                </ul>
            </div>
        </div>

        <!-- Stats grid -->
        <div class="stats-panel">
            <div class="stats-grid" id="statsGrid">

                <!-- Card 1 -->
                <div class="stat-card" data-key="students">
                    <div class="stat-info">
                        <p class="stat-title">Total Students</p>
                        <p class="stat-value" id="val-students">1,240</p>
                        <p class="stat-sub green" id="sub-students">+12% this month</p>
                    </div>
                    <div class="stat-chart">
                        <canvas id="chart-students" width="120" height="70"></canvas>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="stat-card" data-key="completion">
                    <div class="stat-info">
                        <p class="stat-title">Course Completion</p>
                        <p class="stat-value" id="val-completion">68%</p>
                        <p class="stat-sub purple" id="sub-completion">+5% increase</p>
                    </div>
                    <div class="stat-chart">
                        <canvas id="chart-completion" width="120" height="70"></canvas>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="stat-card" data-key="enrolments">
                    <div class="stat-info">
                        <p class="stat-title">Active Enrolments</p>
                        <p class="stat-value" id="val-enrolments">320</p>
                        <p class="stat-sub blue" id="sub-enrolments">Currently learning</p>
                    </div>
                    <div class="stat-chart">
                        <canvas id="chart-enrolments" width="120" height="70"></canvas>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="stat-card" data-key="assignments">
                    <div class="stat-info">
                        <p class="stat-title">Assignments Submitted</p>
                        <p class="stat-value" id="val-assignments">89</p>
                        <p class="stat-sub yellow" id="sub-assignments">This week</p>
                    </div>
                    <div class="stat-chart">
                        <canvas id="chart-assignments" width="120" height="70"></canvas>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script src="auth.js"></script>
    <script src="performance.js"></script>
</body>

</html>
